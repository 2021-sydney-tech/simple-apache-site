name: Deploy Apache Site to Remote Server

# Trigger on pushes to main branch and manual dispatch
on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Cancel previous runs for the same workflow
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REMOTE_PATH: /var/www/html
  LOCAL_PATH: public-html

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run a lightweight static server for validation
        run: |
          cd ${{ env.LOCAL_PATH }}
          python -m http.server 8000 &
          SERVER_PID=$!
          sleep 2
          curl -f http://127.0.0.1:8000/ || (echo "Root page check failed" && kill $SERVER_PID && exit 1)
          curl -f http://127.0.0.1:8000/about.html || (echo "About page check failed" && kill $SERVER_PID && exit 1)
          echo "All tests passed"
          kill $SERVER_PID

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Apache Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          # Copy files to remote server first
          source: "${{ env.LOCAL_PATH }}/"
          target: "/tmp/${{ env.LOCAL_PATH }}"
          # Then run deployment script
          script: |
            # Ensure Apache is running
            if ! systemctl is-active --quiet apache2; then
              echo "Apache is not running. Starting..."
              sudo systemctl start apache2
            fi

            # Backup current site (optional)
            sudo cp -r ${{ env.REMOTE_PATH }} ${{ env.REMOTE_PATH }}.backup.$(date +%Y%m%d_%H%M%S) || true

            # Deploy new files
            sudo rsync -av --delete /tmp/${{ env.LOCAL_PATH }}/ ${{ env.REMOTE_PATH }}/

            # Set proper permissions
            sudo chown -R www-data:www-data ${{ env.REMOTE_PATH }}
            sudo chmod -R 755 ${{ env.REMOTE_PATH }}

            # Reload Apache to apply changes
            sudo systemctl reload apache2

            # Post-deployment health checks
            sudo systemctl is-active --quiet apache2 || (echo "Apache is not active after reload" && exit 1)
            sudo systemctl status apache2 --no-pager

            # Verify key site pages
            curl -f http://localhost/ -o /tmp/deploy-root.html || (echo "Root page check failed" && exit 1)
            curl -f http://localhost/about.html -o /tmp/deploy-about.html || (echo "About page check failed" && exit 1)

            echo "Deployment successful - remote site is accessible"
            echo "Root page size: $(wc -c < /tmp/deploy-root.html) bytes"
            echo "About page size: $(wc -c < /tmp/deploy-about.html) bytes" 
